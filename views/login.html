<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - بوابة التجار</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f4f6fa;
            --card-bg: rgba(255, 255, 255, 0.75);
            --card-border: rgba(255, 255, 255, 0.6);
            --primary-gradient: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            --primary-color: #4f46e5;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --input-bg: rgba(255, 255, 255, 0.85);
            --input-border: #e2e8f0;
            --input-focus: #6366f1;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Container to isolate the background animations from layout flow */
        .bg-blobs-container {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
            pointer-events: none;
        }

        /* Animated background blobs (softer for light mode) */
        .bg-blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(140px);
            opacity: 0.18;
            animation: float 16s infinite alternate ease-in-out;
        }

        .blob-1 {
            width: 450px;
            height: 450px;
            background: #818cf8;
            top: -120px;
            right: -120px;
        }

        .blob-2 {
            width: 500px;
            height: 500px;
            background: #c084fc;
            bottom: -180px;
            left: -180px;
            animation-delay: -8s;
        }

        .blob-3 {
            width: 320px;
            height: 320px;
            background: #22d3ee;
            top: 35%;
            left: 15%;
            animation-delay: -4s;
            opacity: 0.1;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(50px, 30px) scale(1.08); }
            100% { transform: translate(-30px, -45px) scale(0.92); }
        }

        /* Glassmorphism Card Container */
        .login-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 440px;
            padding: 20px;
        }

        .login-card {
            background: var(--card-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--card-border);
            border-radius: 28px;
            padding: 45px 40px;
            box-shadow: 0 20px 40px -15px rgba(15, 23, 42, 0.08), 
                        0 0 0 1px rgba(15, 23, 42, 0.03);
            position: relative;
            overflow: hidden;
        }

        .login-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 3px;
            background: var(--primary-gradient);
            animation: borderGlow 6s infinite linear;
        }

        @keyframes borderGlow {
            0% { left: -100%; }
            50% { left: 100%; }
            100% { left: 100%; }
        }

        .logo-area {
            text-align: center;
            margin-bottom: 36px;
        }

        .logo-icon {
            width: 68px;
            height: 68px;
            background: var(--primary-gradient);
            border-radius: 20px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 18px;
            box-shadow: 0 12px 24px rgba(79, 70, 229, 0.25);
            animation: pulseGlow 3s infinite alternate;
        }

        @keyframes pulseGlow {
            0% { box-shadow: 0 8px 20px rgba(79, 70, 229, 0.2); }
            100% { box-shadow: 0 8px 28px rgba(124, 58, 237, 0.4); }
        }

        .logo-icon svg {
            width: 36px;
            height: 36px;
            fill: #fff;
        }

        .logo-title {
            font-size: 26px;
            font-weight: 800;
            color: #0f172a;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        .logo-subtitle {
            font-size: 14px;
            color: var(--text-muted);
            font-weight: 400;
        }

        /* Form Controls */
        .form-group {
            margin-bottom: 24px;
            position: relative;
        }

        .form-label {
            display: block;
            margin-bottom: 10px;
            color: var(--text-muted);
            font-size: 14px;
            font-weight: 600;
            padding-right: 4px;
            transition: color 0.3s;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon {
            position: absolute;
            right: 16px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            transition: color 0.3s;
        }

        .input-icon svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        .form-input {
            width: 100%;
            padding: 15px 48px 15px 16px; /* Right padding to fit icon */
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 14px;
            color: #0f172a;
            font-size: 15px;
            outline: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.02);
        }

        /* Adjust padding for password field to have show/hide button on left */
        .form-input.password-input {
            padding-left: 48px;
        }

        .form-group:focus-within .form-label {
            color: var(--input-focus);
        }

        .form-group:focus-within .input-icon {
            color: var(--input-focus);
        }

        .form-input:focus {
            border-color: var(--input-focus);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.12),
                        inset 0 1px 2px rgba(0, 0, 0, 0.02);
            background: #fff;
        }

        .form-input::placeholder {
            color: #94a3b8;
        }

        .password-toggle {
            position: absolute;
            left: 16px;
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            outline: none;
            transition: color 0.3s;
        }

        .password-toggle:hover {
            color: #0f172a;
        }

        .password-toggle svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        /* Action Buttons */
        .btn-submit {
            width: 100%;
            padding: 15px;
            background: var(--primary-gradient);
            color: #fff;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 700;
            margin-top: 10px;
            box-shadow: 0 4px 14px rgba(79, 70, 229, 0.25);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            position: relative;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(79, 70, 229, 0.35);
            filter: brightness(1.05);
        }

        .btn-submit:active {
            transform: translateY(1px);
        }

        /* Spinner animation on click */
        .btn-submit.loading {
            pointer-events: none;
            opacity: 0.8;
        }

        .btn-submit.loading .btn-text {
            visibility: hidden;
            opacity: 0;
        }

        .spinner {
            position: absolute;
            width: 22px;
            height: 22px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        .btn-submit.loading .spinner {
            display: block;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .footer-links {
            margin-top: 32px;
            text-align: center;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            transition: color 0.3s, transform 0.3s;
        }

        .back-link:hover {
            color: #0f172a;
        }

        .back-link svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
            transition: transform 0.3s;
        }

        .back-link:hover svg {
            transform: translateX(4px); /* Moves rightwards (towards starting point) in RTL */
        }
    </style>
</head>
<body>
    <!-- Background Blobs Container -->
    <div class="bg-blobs-container">
        <div class="bg-blob blob-1"></div>
        <div class="bg-blob blob-2"></div>
        <div class="bg-blob blob-3"></div>
    </div>

    <div class="login-container">
        <div class="login-card">
            <div class="logo-area">
                <div class="logo-icon">
                    <!-- Modern E-commerce Dashboard Lock SVG -->
                    <svg viewBox="0 0 24 24">
                        <path d="M19 6h-2c0-2.76-2.24-5-5-5S7 3.24 7 6H5c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm-7-3c1.66 0 3 1.34 3 3H9c0-1.66 1.34-3 3-3zm7 17H5V8h14v12zm-7-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3zm0 4.5c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/>
                    </svg>
                </div>
                <h1 class="logo-title">دخول التجار</h1>
                <p class="logo-subtitle">سجل الدخول لإدارة متجرك والطلبيات</p>
            </div>

            <form action="/?account=admin_login" method="POST" id="loginForm">
                <div class="form-group">
                    <label class="form-label">البريد الإلكتروني</label>
                    <div class="input-wrapper">
                        <div class="input-icon">
                            <!-- Envelope SVG -->
                            <svg viewBox="0 0 24 24">
                                <path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/>
                            </svg>
                        </div>
                        <input type="email" name="email" class="form-input" placeholder="name@example.com" required autocomplete="email">
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">كلمة المرور</label>
                    <div class="input-wrapper">
                        <div class="input-icon">
                            <!-- Lock SVG -->
                            <svg viewBox="0 0 24 24">
                                <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/>
                            </svg>
                        </div>
                        <input type="password" name="password" id="passwordInput" class="form-input password-input" placeholder="••••••••" required autocomplete="current-password">
                        <button type="button" class="password-toggle" id="passwordToggle" aria-label="إظهار كلمة المرور">
                            <!-- Eye SVG -->
                            <svg id="eyeIcon" viewBox="0 0 24 24">
                                <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn-submit" id="submitBtn">
                    <span class="btn-text">تسجيل الدخول</span>
                    <span class="spinner"></span>
                </button>
            </form>

            <div class="footer-links">
                <a href="/" class="back-link">
                    <!-- Chevron Right SVG -->
                    <svg viewBox="0 0 24 24">
                        <path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/>
                    </svg>
                    <span>العودة للمتجر</span>
                </a>
            </div>
        </div>
    </div>

    <script>
        const passwordInput = document.getElementById('passwordInput');
        const passwordToggle = document.getElementById('passwordToggle');
        const eyeIcon = document.getElementById('eyeIcon');
        const loginForm = document.getElementById('loginForm');
        const submitBtn = document.getElementById('submitBtn');

        // SVG Path strings for eye and eye-slash states
        const eyePath = "M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z";
        const eyeSlashPath = "M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.82l2.92 2.92c1.51-1.2 2.7-2.78 3.44-4.74-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46C3.08 8.3 1.78 10.02 1 12c1.73 4.39 6 7.5 11 7.5 2.2 0 4.28-.59 6.07-1.61l.46.46 2.2 2.2 1.27-1.27L3.27 3 2 4.27zm10.73 10.73c-.23.01-.48.02-.73.02-2.76 0-5-2.24-5-5 0-.25.01-.5.02-.73l5.71 5.71zM12 9c.65 0 1.26.13 1.82.36L9.36 13.82C9.13 13.26 9 12.65 9 12c0-1.66 1.34-3 3-3z";

        passwordToggle.addEventListener('click', () => {
            const isPassword = passwordInput.getAttribute('type') === 'password';
            if (isPassword) {
                passwordInput.setAttribute('type', 'text');
                eyeIcon.innerHTML = `<path d="${eyeSlashPath}"/>`;
                passwordToggle.setAttribute('aria-label', 'إخفاء كلمة المرور');
            } else {
                passwordInput.setAttribute('type', 'password');
                eyeIcon.innerHTML = `<path d="${eyePath}"/>`;
                passwordToggle.setAttribute('aria-label', 'إظهار كلمة المرور');
            }
        });

        // Trigger loading state on submission
        loginForm.addEventListener('submit', () => {
            submitBtn.classList.add('loading');
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{pageTitle}} - {{storeName}}</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-light: #eef2ff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --bg-light: #f8fafc;
            --white: #ffffff;
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Tajawal', sans-serif;
        }

        body {
            background-color: var(--bg-light);
            color: var(--text-main);
            line-height: 1.8;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: var(--white);
            padding: 20px 0;
            border-bottom: 1px solid #e2e8f0;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 24px;
            font-weight: 900;
            color: var(--primary);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .main-content {
            flex: 1;
            padding: 60px 0;
        }

        .page-card {
            background: var(--white);
            border-radius: 24px;
            padding: 50px;
            box-shadow: var(--shadow);
            border: 1px solid #f1f5f9;
        }

        .page-header {
            text-align: center;
            margin-bottom: 40px;
            padding-bottom: 30px;
            border-bottom: 2px dashed #f1f5f9;
        }

        h1 {
            font-size: 36px;
            font-weight: 900;
            color: var(--text-main);
            margin-bottom: 15px;
        }

        .page-meta {
            font-size: 14px;
            color: var(--text-muted);
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .content-area {
            font-size: 17px;
            color: #334155;
        }

        .content-area p {
            margin-bottom: 20px;
        }

        .content-area h2, .content-area h3 {
            margin: 35px 0 20px;
            color: var(--text-main);
        }

        footer {
            background: #0f172a;
            color: white;
            padding: 40px 0;
            text-align: center;
            margin-top: 60px;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: var(--primary-light);
            color: var(--primary);
            text-decoration: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 14px;
            transition: 0.2s;
            margin-bottom: 30px;
        }

        .back-btn:hover {
            background: var(--primary);
            color: white;
        }

        @media (max-width: 640px) {
            .page-card {
                padding: 30px 20px;
            }
            h1 {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="container header-content">
            <a href="/" class="logo">
                <i class="fas fa-gem"></i>
                <span>{{storeName}}</span>
            </a>
            <a href="/" style="text-decoration:none; color:var(--text-muted); font-weight:700; font-size:14px;">العودة للمتجر</a>
        </div>
    </header>

    <main class="main-content">
        <div class="container">
            <a href="/" class="back-btn"><i class="fas fa-arrow-right"></i> العودة للمتجر</a>
            <article class="page-card">
                <div class="page-header">
                    <h1>{{pageTitle}}</h1>
                    <div class="page-meta">
                        <span><i class="far fa-calendar-alt"></i> آخر تحديث: {{lastUpdated}}</span>
                        <span><i class="far fa-clock"></i> {{readTime}}</span>
                    </div>
                </div>
                <div class="content-area">
                    {{pageContent}}
                </div>
            </article>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>© {{currentYear}} {{storeName}} - جميع الحقوق محفوظة.</p>
        </div>
    </footer>
</body>
</html>
